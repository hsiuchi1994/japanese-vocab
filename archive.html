<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>單字庫</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4CAF50">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="日本語">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Hiragino Sans', sans-serif; background: #f5f5f7; min-height: 100vh; }
  .header { background: #fff; padding: 16px 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .back-btn { font-size: 22px; color: #4CAF50; cursor: pointer; text-decoration: none; }
  .title { font-size: 16px; font-weight: 700; color: #1a1a1a; }
  .count { font-size: 13px; color: #888; margin-left: auto; }
  .search { width: 100%; padding: 10px 14px; border: 1.5px solid #e0e0e0; border-radius: 12px; font-size: 15px; outline: none; }
  .search:focus { border-color: #4CAF50; }
  .content { padding: 12px 16px; max-width: 480px; margin: 0 auto; }
  .word-card { background: #fff; border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); cursor: pointer; }
  .word-top { display: flex; align-items: baseline; gap: 10px; }
  .word-kanji { font-size: 22px; font-weight: 700; color: #1a1a1a; }
  .word-reading { font-size: 14px; color: #777; }
  .word-pos { font-size: 11px; color: #4CAF50; background: #e8f5e9; padding: 1px 8px; border-radius: 20px; margin-left: auto; }
  .word-meaning { font-size: 14px; color: #555; margin-top: 4px; }
  .word-detail { display: none; margin-top: 10px; border-top: 1px solid #f0f0f0; padding-top: 10px; }
  .word-card.open .word-detail { display: block; }
  .detail-label { font-size: 11px; font-weight: 700; color: #aaa; letter-spacing: 0.06em; margin: 8px 0 4px; }
  .sentence-item { font-size: 13px; color: #444; background: #f9fafb; border-radius: 8px; padding: 6px 10px; margin-bottom: 4px; }
  .related-item { font-size: 13px; color: #555; padding: 3px 0; border-bottom: 1px solid #f5f5f5; }
  .empty { text-align: center; color: #bbb; padding: 60px 20px; font-size: 15px; }
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <a class="back-btn" href="index.html">←</a>
    <span class="title">📖 單字庫</span>
    <span class="count" id="countLabel"></span>
  </div>
  <input class="search" id="searchBox" placeholder="搜尋單字、讀音、中文意思..." oninput="filter()">
</div>
<div class="content" id="listArea"></div>

<script>
const words = [{"id": 0, "kanji": "愛情", "reading": "あいじょう", "pos": "名", "meaning": "愛，愛情；熱愛", "sentences": ["母の愛情（母愛）"], "related": ["▸ 同字根：苦情 （くじょう）（抱怨）"]}, {"id": 1, "kanji": "赤字", "reading": "あかじ", "pos": "名", "meaning": "赤字，虧空", "sentences": ["赤字が大切だ（赤字很重要）"], "related": ["↔ 反義：黒字 （くろじ）（盈餘）"]}, {"id": 2, "kanji": "明かり", "reading": "あかり", "pos": "名", "meaning": "光亮；燈火", "sentences": ["明かりを消す（滅燈）"], "related": ["▸ 同字根：明け方 （あけがた）（黎明）", "▸ 同字根：透明な （とうめいな）（透明的）", "▸ 同字根：明くる （あくる）（下一個）"]}, {"id": 3, "kanji": "悪天候", "reading": "あくてんこう", "pos": "名", "meaning": "壞天氣", "sentences": ["悪天候を感じる（感受到壞天氣）"], "related": ["▸ 同字根：悪魔 （あくま）（惡魔）", "▸ 同字根：悪寒 （おかん）（發冷）", "▸ 同字根：悪口 （わるくち）（壞話）"]}, {"id": 4, "kanji": "悪魔", "reading": "あくま", "pos": "名", "meaning": "惡魔，魔鬼", "sentences": ["悪魔について考える（思考惡魔）"], "related": ["↔ 反義：天使 （てんし）（天使）"]}, {"id": 5, "kanji": "明け方", "reading": "あけがた", "pos": "名", "meaning": "黎明，拂曉", "sentences": ["明け方を理解する（理解黎明）"], "related": ["↔ 反義：夕方 （ゆうがた）（傍晚）"]}, {"id": 6, "kanji": "圧縮", "reading": "あっしゅく", "pos": "名·他サ", "meaning": "壓縮", "sentences": ["圧縮することが大切だ（壓縮很重要）"], "related": ["▸ 同字根：気圧 （きあつ）（氣壓）", "▸ 同字根：血圧 （けつあつ）（血壓）", "▸ 同字根：恐縮 （きょうしゅく）（惶恐）"]}, {"id": 7, "kanji": "宛名", "reading": "あてな", "pos": "名", "meaning": "收信人姓名（地址）", "sentences": ["宛名が必要だ（需要收信人姓名）"], "related": ["▸ 同字根：仮名 （かな）（假名）", "▸ 同字根：署名 （しょめい）（籤名）", "▸ 同字根：代名詞 （だいめいし）（代名詞）"]}, {"id": 8, "kanji": "跡", "reading": "あと", "pos": "名", "meaning": "痕跡；行蹤", "sentences": ["跡を追う（追趕；效仿）"], "related": ["▸ 複合：足跡 （あしあと）（足跡）"]}, {"id": 9, "kanji": "穴", "reading": "あな", "pos": "名", "meaning": "孔，眼；洞", "sentences": ["鼻の穴（鼻孔）", "穴があれば入りたい（想找個地洞鑽進去）"], "related": []}, {"id": 10, "kanji": "過ち", "reading": "あやまち", "pos": "名", "meaning": "錯誤；過失", "sentences": ["過ちを犯す（犯錯）"], "related": ["≈ 近義：間違 （まちが）い（錯誤）"]}, {"id": 11, "kanji": "誤り", "reading": "あやまり", "pos": "名", "meaning": "錯誤", "sentences": ["誤りを感じる（感受到錯誤）"], "related": ["≈ 近義：間違い（錯誤）"]}, {"id": 12, "kanji": "嵐", "reading": "あらし", "pos": "名", "meaning": "暴風雨", "sentences": ["嵐が起こる（起風暴）", "嵐の前の静けさ（暴風雨前的平靜）"], "related": []}, {"id": 13, "kanji": "粗筋", "reading": "あらすじ", "pos": "名", "meaning": "概要，梗概", "sentences": ["粗筋が必要だ（需要概要）"], "related": ["≈ 近義：要約 （ようやく）（摘要，概要）"]}, {"id": 14, "kanji": "案", "reading": "あん", "pos": "名", "meaning": "主意；方案", "sentences": ["案を出す（出主意）"], "related": ["▸ 複合：予算案 （よさんあん）（預算案）"]}, {"id": 15, "kanji": "胃", "reading": "い", "pos": "名", "meaning": "胃", "sentences": ["胃が痛い（胃疼）"], "related": []}, {"id": 16, "kanji": "委員", "reading": "いいん", "pos": "名", "meaning": "委員", "sentences": ["委員会（委員會）"], "related": ["▸ 同字根：議員 （ぎいん）（議員）", "▸ 同字根：教員 （きょういん）（教師）"]}, {"id": 17, "kanji": "息", "reading": "いき", "pos": "名", "meaning": "呼吸；氣息", "sentences": ["息が合う（步調一致；合得來）"], "related": []}];
words.reverse();

function render(list) {
  const area = document.getElementById('listArea');
  document.getElementById('countLabel').textContent = list.length + ' 個單字';
  if (!list.length) {
    area.innerHTML = '<div class="empty">找不到符合的單字</div>';
    return;
  }
  area.innerHTML = list.map((w, i) => `
    <div class="word-card" onclick="toggle(${i})">
      <div class="word-top">
        <span class="word-kanji">${w.kanji}</span>
        <span class="word-reading">${w.reading}</span>
        <span class="word-pos">${w.pos || '—'}</span>
      </div>
      <div class="word-meaning">${w.meaning}</div>
      <div class="word-detail">
        ${w.sentences && w.sentences.length ? '<div class="detail-label">例句</div>' + w.sentences.map(s => `<div class="sentence-item">${s}</div>`).join('') : ''}
        ${w.related && w.related.length ? '<div class="detail-label">相關字</div>' + w.related.map(r => `<div class="related-item">${r}</div>`).join('') : ''}
      </div>
    </div>`).join('');
}

let filtered = [...words];
function filter() {
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  filtered = q ? words.filter(w =>
    w.kanji.includes(q) || w.reading.includes(q) || w.meaning.includes(q)
  ) : [...words];
  render(filtered);
}

function toggle(i) {
  const cards = document.querySelectorAll('.word-card');
  cards[i].classList.toggle('open');
}

render(filtered);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
